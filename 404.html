<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BlisyDex</title>
    <script>
      // SPA redirect for GitHub Pages.
      // Encodes the full path as a single query parameter to avoid any
      // encoding/decoding issues with special characters.
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
